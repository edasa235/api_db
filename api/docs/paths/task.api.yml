post:
  operationId: createTask
  summary: Create a new task
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - title
            - status
          properties:
            title:
              type: string
              example: "New Task"
            description:
              type: string
              example: "This is a new task."
            status:
              type: string
              enum: [ BACKLOG, READY, IN_PROGRESS, IN_REVIEW, IN_TESTING, COMPLETED ]
              example: BACKLOG
            assignee_id:
              type: string
              example: "1"
  responses:
    "201":
      description: Created
      content:
        application/json:
          schema:
            $ref: '../schema/task.yml'
    "400":
      description: Bad request (invalid input)
    "401":
      description: Unauthorized
    "500":
      description: Internal server error
get:
    operationId: getTask
    summary: Get a task by ID
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          example: "1"
    responses:
      "200":
        description: OK
        content:
          application/json:
            schema:
              $ref: '../schema/task.yml'
      "404":
        description: Task not found
      "401":
        description: Unauthorized
      "500":
        description: Internal server error

put:
    operationId: updateTask
    summary: Update a task by ID
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          example: "1"
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            properties:
              title:
                type: string
              description:
                type: string
              status:
                type: string
                enum: [ BACKLOG, READY, IN_PROGRESS, IN_REVIEW, IN_TESTING, COMPLETED ]
              assignee_id:
                type: string
    responses:
      "200":
        description: Updated
        content:
          application/json:
            schema:
              $ref: '../schema/task.yml'
      "400":
        description: Bad request
      "404":
        description: Task not found
      "401":
        description: Unauthorized
      "500":
        description: Internal server error

delete:
    operationId: deleteTask
    summary: Delete a task by ID
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          example: "1"
    responses:
      "204":
        description: No Content
      "404":
        description: Task not found
      "401":
        description: Unauthorized
      "500":
        description: Internal server error