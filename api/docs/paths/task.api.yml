get:
  operationId: getTask
  summary: Get a task by ID
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        example: "0ad58663-83ef-436c-841c-954c11cae6c2"
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: '../schema/task.yml'
    '404':
      $ref: '../../openapi.yml#/components/responses/Error404'

post:
  operationId: createTask
  summary: Create a new task
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required: [ title, status ]
          properties:
            title:
              type: string
              example: "New Task"
            description:
              type: string
              example: "This is a new task."
            status:
              type: string
              enum: [ BACKLOG, READY, IN_PROGRESS, IN_REVIEW, IN_TESTING, COMPLETED ]
              example: BACKLOG
            assignee_id:
              type: string
              example: "1"
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            $ref: '../schema/task.yml'
    '400':
      $ref: '../../openapi.yml#/components/responses/Error400'
    '401':
      $ref: '../../openapi.yml#/components/responses/Error401'
    '403':
      $ref: '../../openapi.yml#/components/responses/Error403'
    '404':
      $ref: '../../openapi.yml#/components/responses/Error404'
put:
  operationId: updateTask
  summary: Update a task by ID
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        example: "0ad58663-83ef-436c-841c-954c11cae6c2"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            title:
              type: string
              example: "Updated Task"
            description:
              type: string
              example: "This is an updated task."
            status:
              type: string
              enum: [ BACKLOG, READY, IN_PROGRESS, IN_REVIEW, IN_TESTING, COMPLETED ]
              example: READY
            assignee_id:
              type: string
              example: "2"
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: '../schema/task.yml'
    '404':
     $ref: '../../openapi.yml#/components/responses/Error404'


delete:
  operationId: deleteTask
  summary: Delete a task by ID
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
        example: "0ad58663-83ef-436c-841c-954c11cae6c2"
  responses:
    '204':
      description: No Content
    '404':
      $ref: '../../openapi.yml#/components/responses/Error404'
