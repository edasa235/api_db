get:
  /tasks:
  operationId: getTasks
  summary: Get all tasks
  responses:
    "200":
        description: OK
        content:
            application/json:
            schema:
                type: array
                items:
                $ref: '../schema/task.yml'
    "401":
        $ref: ../schema/error.yml
    "403":
        $ref: ../schema/error.yml
    "404":
        $ref: ../schema/error.yml
    "400":
        $ref: ../schema/error.yml
