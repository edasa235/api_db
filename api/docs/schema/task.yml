type: object
required:
  - id
  - title
  - status
properties:
  id:
    type: string
    Format: uuid
    readOnly: true
    example: "0ad58663-83ef-436c-841c-954c11cae6c2"
  title:
    type: string
    example: "Task 1"
  description:
    type: string
    example: "This is the first task."
  status:
    type: string
    enum: [ BACKLOG, READY, IN_PROGRESS IN_REVIEW, IN_TESTING, COMPLETED ]
    example: BACKLOG
  assignee_id:
    type: string
    example: "1"
  created_at:
    type: string
    format: date-time
    readOnly: true
    example: "2024-01-01T12:00:00Z"
  completed_at:
    type: string
    format: date-time
    readOnly: true
    example: "2024-01-02T12:00:00Z"