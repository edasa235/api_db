description: Error response
content:
  application/json:
    schema:
      type: object
      required:
        - code
      properties:
        code:
          type: string
    examples:
      UNAUTHORIZED:
        value:
          code: UNAUTHORIZED
      FORBIDDEN:
        value:
          code: FORBIDDEN
      NOT_FOUND:
        value:
          code: NOT_FOUND
      TOO_MANY_REQUESTS:
        value:
          code: TOO_MANY_REQUESTS
      INTERNAL_SERVER_ERROR:
        value:
          code: INTERNAL_SERVER_ERROR